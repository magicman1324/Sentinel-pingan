# Sentinel Alertmanager Configuration
# HA cluster with Gossip protocol

global:
  resolve_timeout: 5m
  smtp_smarthost: "smtp.pingan.com:587"
  smtp_from: "sentinel@pingan.com"
  smtp_require_tls: true

# Gossip-based HA clustering
cluster:
  name: sentinel-alertmanager
  peers:
    - alertmanager-0.alertmanager:9094
    - alertmanager-1.alertmanager:9094
    - alertmanager-2.alertmanager:9094
  listen_address: "0.0.0.0:9094"

route:
  receiver: "default"
  group_by: ["cluster", "alertname"]
  group_wait: 10s
  group_interval: 2m
  repeat_interval: 1h

  routes:
    - match:
        severity: critical
      receiver: "dingtalk-critical"
      group_wait: 5s
      repeat_interval: 5m

    - match:
        severity: warning
      receiver: "email-warning"
      group_interval: 30m

    - match:
        severity: info
      receiver: "null"

receivers:
  - name: "default"
    webhook_configs:
      - url: "http://backend.sentinel:8080/api/v1/alerts/webhook"

  - name: "dingtalk-critical"
    webhook_configs:
      - url: "http://backend.sentinel:8080/api/v1/alerts/webhook/dingtalk"
        send_resolved: true
        http_config:
          follow_redirects: true

  - name: "email-warning"
    email_configs:
      - to: "ops-team@pingan.com"
        from: "sentinel@pingan.com"
        smarthost: "smtp.pingan.com:587"
        html: '{{ template "email.daily" . }}'
        require_tls: true
        send_resolved: false

  - name: "null"

# Suppression: root cause → silence downstream noise
inhibit_rules:
  - source_match:
      alertname: "NetworkUnreachable"
      severity: critical
    target_match_re:
      alertname: "(DatabaseConnectionFailed|ServiceTimeout|APIGatewayDown)"
    equal: ["cluster"]

  - source_match:
      alertname: "NodeDown"
      severity: critical
    target_match_re:
      alertname: ".*"
    equal: ["hostname"]

# Per-alert concurrency limiting to protect DingTalk from rate-limiting
limits:
  alerts_per_alertname:
    NetworkUnreachable: 5
    CPUSaturation: 20
    MemoryPressure: 20
