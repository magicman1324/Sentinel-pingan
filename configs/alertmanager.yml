route:
  receiver: "default"
  group_by: ["cluster", "alertname"]
  group_wait: 10s
  group_interval: 2m
  repeat_interval: 1h
  routes:
    - match:
        severity: critical
      receiver: "dingtalk-critical"
      repeat_interval: 10m
    - match:
        severity: warning
      receiver: "email-warning"

receivers:
  - name: "default"
    webhook_configs:
      - url: "http://backend:8080/api/v1/alerts/webhook"

  - name: "dingtalk-critical"
    webhook_configs:
      - url: "https://oapi.dingtalk.com/robot/send?access_token=${DINGTALK_TOKEN}"
        send_resolved: true
        http_config:
          headers:
            Content-Type: "application/json"

  - name: "email-warning"
    email_configs:
      - to: "${ALERT_EMAIL}"
        from: "monitor@pingan.com"
        smarthost: "smtp.pingan.com:587"

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ["cluster"]
