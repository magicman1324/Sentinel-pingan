apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinel-dashboard
spec:
  replicas: {{ .Values.dashboard.replicas }}
  selector:
    matchLabels: { app: sentinel-dashboard }
  template:
    metadata:
      labels: { app: sentinel-dashboard }
    spec:
      containers:
      - name: dashboard
        image: {{ .Values.dashboard.image }}
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: sentinel-dashboard
spec:
  type: ClusterIP
  selector: { app: sentinel-dashboard }
  ports:
  - port: 80
    targetPort: 80
